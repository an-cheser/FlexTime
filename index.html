<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FlexTime">
    <meta name="theme-color" content="#1a472a">
    <title>FlexTime — учёт гибкого рабочего времени</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* ---------- ТЁМНАЯ ТЕМА (фиолетово-оранжевая, по умолчанию) ---------- */
        :root {
            --bg-gradient: radial-gradient(circle at 20% 30%, #1a0a2e, #0d1b2a, #2a0d1a);
            --card-bg: rgba(30, 20, 60, 0.35);
            --card-border: rgba(255, 160, 80, 0.3);
            --header-bg: rgba(20, 10, 40, 0.6);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-muted: rgba(255, 200, 150, 0.6);
            --border-color: rgba(255, 140, 60, 0.3);
            --btn-arrive-bg: linear-gradient(135deg, #ff8c42, #ff3b6f);
            --btn-leave-bg: linear-gradient(135deg, #8b5cf6, #3b82f6);
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-focus-bg: rgba(255, 140, 66, 0.15);
            --stats-bg: rgba(30, 20, 60, 0.3);
            --badge-bg: rgba(139, 92, 246, 0.3);
            --clear-btn-color: #ff8c42;
            --clear-btn-active-bg: rgba(255, 140, 66, 0.2);
            --log-item-bg: rgba(45, 25, 80, 0.4);
            --log-item-border: rgba(255, 140, 66, 0.2);
            --footer-bg: rgba(20, 10, 40, 0.9);
            --tab-btn-color: rgba(255, 255, 255, 0.7);
            --tab-btn-active-bg: rgba(139, 92, 246, 0.3);
            --menu-bg: rgba(30, 20, 55, 0.95);
            --edit-color: #ffaa66;
            --delete-color: #ff7b9c;
        }

        /* ---------- СВЕТЛАЯ ТЕМА ---------- */
        body.light-theme {
            --bg-gradient: radial-gradient(circle at 20% 30%, #f5f0ff, #ffe8e0);
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(139, 92, 246, 0.2);
            --header-bg: rgba(255, 255, 255, 0.85);
            --text-primary: #2d1b4e;
            --text-secondary: #5a3d8c;
            --text-muted: #9a7bcb;
            --border-color: rgba(139, 92, 246, 0.15);
            --btn-arrive-bg: linear-gradient(135deg, #ff8c42, #ff3b6f);
            --btn-leave-bg: linear-gradient(135deg, #8b5cf6, #3b82f6);
            --input-bg: rgba(0, 0, 0, 0.03);
            --input-focus-bg: rgba(139, 92, 246, 0.08);
            --stats-bg: rgba(0, 0, 0, 0.03);
            --badge-bg: rgba(139, 92, 246, 0.12);
            --clear-btn-color: #d94a2a;
            --clear-btn-active-bg: rgba(255, 140, 66, 0.12);
            --log-item-bg: rgba(139, 92, 246, 0.05);
            --log-item-border: rgba(139, 92, 246, 0.1);
            --footer-bg: rgba(255, 245, 250, 0.95);
            --tab-btn-color: #4a2a6a;
            --tab-btn-active-bg: rgba(139, 92, 246, 0.12);
            --menu-bg: rgba(255, 255, 255, 0.95);
            --edit-color: #d95a1a;
            --delete-color: #c62828;
        }

        /* ---------- База ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-touch-callout: none;
        }
        html { font-size: 16px; }
        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right))
                     max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
            padding-bottom: calc(5rem + env(safe-area-inset-bottom));
            font-family: -apple-system, BlinkMacSystemFont, Roboto, Helvetica, sans-serif;
            touch-action: manipulation;
            transition: background 0.3s ease;
        }
        .app-container {
            max-width: 37.5rem;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            overflow: hidden;
            box-shadow: 0 0.5rem 2rem rgba(0,0,0,0.2), inset 0 0.0625rem 0 rgba(255,255,255,0.1);
            border: 0.0625rem solid var(--card-border);
            display: flex;
            flex-direction: column;
            min-height: 80vh;
        }

        /* ----- Шапка ----- */
        .header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            padding: max(1.25rem, env(safe-area-inset-top)) 1.25rem 1.25rem 1.25rem;
            text-align: center;
            border-bottom: 0.0625rem solid var(--border-color);
            position: relative;
        }
        .theme-switch-wrapper {
            position: absolute;
            top: max(1rem, env(safe-area-inset-top));
            right: 1rem;
        }
        .theme-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 2rem;
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.2s;
        }
        .theme-toggle:active { transform: scale(0.95); background: rgba(255,255,255,0.4); }
        body.light-theme .theme-toggle { background: rgba(0,0,0,0.1); }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 0.125rem 0.625rem rgba(0,0,0,0.2);
            color: var(--text-primary);
        }
        .header p {
            font-size: 0.875rem;
            opacity: 0.7;
            letter-spacing: 0.03125rem;
            color: var(--text-secondary);
        }

        /* ----- Кнопки прихода/ухода ----- */
        .action-buttons { padding: 1.5rem 1.25rem 1rem; display: flex; gap: 0.875rem; }
        .action-btn {
            flex: 1;
            padding: 1.125rem 0.75rem;
            border: none;
            border-radius: 5rem;
            font-size: 1.125rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            cursor: pointer;
            transition: transform 0.1s ease;
            touch-action: manipulation;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }
        .action-btn:active { transform: scale(0.97); filter: brightness(0.95); }
        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
            border-radius: 5rem;
        }
        .btn-arrive {
            background: var(--btn-arrive-bg);
            color: #fff;
            box-shadow: 0 0.5rem 1.25rem rgba(255,140,66,0.3);
            border: 0.0625rem solid rgba(255,255,255,0.2);
        }
        .btn-leave {
            background: var(--btn-leave-bg);
            color: #fff;
            box-shadow: 0 0.5rem 1.25rem rgba(139,92,246,0.3);
            border: 0.0625rem solid rgba(255,255,255,0.2);
        }

        /* ----- Поле заметок ----- */
        .note-section { padding: 0.5rem 1.25rem 1.25rem; }
        .note-input {
            width: 100%;
            padding: 0.875rem 1.125rem;
            border: none;
            border-radius: 2rem;
            font-size: 0.9375rem;
            font-family: inherit;
            background: var(--input-bg);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            resize: none;
            transition: all 0.2s;
            border: 0.0625rem solid var(--border-color);
        }
        .note-input:focus {
            outline: none;
            background: var(--input-focus-bg);
            border-color: var(--border-color);
        }
        .note-input::placeholder { color: var(--text-muted); }

        /* ----- Статистика ----- */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 1.25rem;
            background: var(--stats-bg);
            backdrop-filter: blur(10px);
            border-top: 0.0625rem solid var(--border-color);
            border-bottom: 0.0625rem solid var(--border-color);
        }
        .count-badge {
            background: var(--badge-bg);
            backdrop-filter: blur(8px);
            color: var(--text-primary);
            padding: 0.375rem 1rem;
            border-radius: 2.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            border: 0.0625rem solid var(--border-color);
        }
        .today-stats { font-size: 0.8125rem; color: var(--text-secondary); font-weight: 500; }
        .clear-btn {
            background: rgba(255,255,255,0.08);
            border: 0.0625rem solid var(--border-color);
            padding: 0.375rem 1rem;
            border-radius: 2.5rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--clear-btn-color);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }
        .clear-btn:active {
            background: var(--clear-btn-active-bg);
            transform: scale(0.96);
            border-color: var(--clear-btn-color);
        }

        /* ----- История событий ----- */
        .history-section { flex: 1; overflow-y: auto; padding: 1.25rem; background: transparent; }
        .history-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .log-container { display: flex; flex-direction: column; gap: 0.625rem; }
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 0.625rem; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 0.625rem; }
        .log-item {
            background: var(--log-item-bg);
            backdrop-filter: blur(16px);
            padding: 0.875rem;
            border-radius: 1.25rem;
            box-shadow: 0 0.25rem 1rem rgba(0,0,0,0.1);
            border: 0.0625rem solid var(--log-item-border);
            transition: all 0.2s;
            cursor: pointer;
        }
        .log-item:active { transform: scale(0.99); background: rgba(0,0,0,0.05); }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .log-type {
            font-weight: 700;
            font-size: 0.8125rem;
            padding: 0.25rem 0.875rem;
            border-radius: 1.875rem;
            background: rgba(0,0,0,0.08);
            backdrop-filter: blur(4px);
            letter-spacing: 0.01875rem;
        }
        .log-type.arrive {
            color: #ffaa66;
            border-left: 0.125rem solid #ff8c42;
        }
        body.light-theme .log-type.arrive { color: #d95a1a; }
        .log-type.leave {
            color: #a78bfa;
            border-left: 0.125rem solid #8b5cf6;
        }
        body.light-theme .log-type.leave { color: #6d4bcb; }
        .log-time {
            font-size: 1.125rem;
            font-weight: 700;
            font-family: monospace;
            color: var(--text-primary);
            letter-spacing: 0.03125rem;
        }
        .log-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.125rem;
        }
        .log-note {
            margin-top: 0.625rem;
            padding-top: 0.5rem;
            border-top: 0.0625rem solid var(--border-color);
            font-size: 0.8125rem;
            color: var(--text-secondary);
            font-style: italic;
        }
        .empty-state {
            text-align: center;
            padding: 3.125rem 1.25rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.02);
            border-radius: 1.75rem;
            backdrop-filter: blur(8px);
            font-size: 0.875rem;
        }
        .empty-state span {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.75rem;
            opacity: 0.7;
        }

        /* ----- Нижний таб-бар ----- */
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--footer-bg);
            backdrop-filter: blur(20px);
            border-top: 0.0625rem solid var(--border-color);
            padding: 0.5rem 0.75rem 0.75rem;
            z-index: 1000;
        }
        .tab-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 37.5rem;
            margin: 0 auto;
            gap: 0.5rem;
        }
        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem 0;
            border-radius: 2rem;
            transition: all 0.1s ease;
            color: var(--tab-btn-color);
        }
        .tab-btn:active {
            transform: scale(0.95);
            background: var(--tab-btn-active-bg);
        }
        .tab-icon {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }
        .tab-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        @media (max-width: 380px) {
            .tab-label { display: none; }
            .tab-icon { font-size: 1.75rem; margin-bottom: 0; }
        }

        /* ----- Меню действий ----- */
        .action-menu {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--menu-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 12px;
            z-index: 20001;
            display: flex;
            gap: 12px;
            justify-content: center;
            border: 0.0625rem solid var(--border-color);
            animation: fadeInUp 0.2s ease;
        }
        .action-menu button {
            flex: 1;
            background: rgba(0,0,0,0.1);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.1s;
            color: var(--text-primary);
        }
        .action-menu button:active {
            transform: scale(0.96);
            background: rgba(0,0,0,0.2);
        }
        .action-menu .edit-btn { color: var(--edit-color); }
        .action-menu .delete-btn { color: var(--delete-color); }

        /* ----- Анимации ----- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(0.75rem); }
            to { opacity: 1; transform: translateY(0); }
        }
        .log-item { animation: slideIn 0.25s ease; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>⏱️ FlexTime</h1>
        <p>Учёт гибкого рабочего времени | Приход → Уход</p>
        <div class="theme-switch-wrapper">
            <button id="themeToggle" class="theme-toggle" aria-label="Сменить тему">🌙</button>
        </div>
    </div>
    <div class="action-buttons">
        <button class="action-btn btn-arrive" id="arriveBtn">🏢 ПРИХОД</button>
        <button class="action-btn btn-leave" id="leaveBtn">🏠 УХОД</button>
    </div>
    <div class="note-section">
        <textarea class="note-input" id="noteInput" rows="2" placeholder="📝 Заметка (необязательно)"></textarea>
    </div>
    <div class="stats-bar">
        <div><span class="count-badge" id="counter">0 записей</span></div>
        <div class="today-stats" id="todayStats">Сегодня: —</div>
        <button class="clear-btn" id="clearBtn">🗑 Очистить</button>
    </div>
    <div class="history-section">
        <div class="history-title">📜 История событий</div>
        <div class="log-container" id="logContainer">
            <div class="empty-state">
                <span>👆</span>
                Нажми «ПРИХОД» когда придёшь на работу<br>
                Нажми «УХОД» когда уходишь
            </div>
        </div>
    </div>
</div>

<div class="footer-bar">
    <div class="tab-bar">
        <button class="tab-btn" id="exportReportBtn">📊 <span class="tab-label">Отчёт</span></button>
        <button class="tab-btn" id="exportBtn">📄 <span class="tab-label">CSV</span></button>
        <button class="tab-btn" id="restoreCsvBtn">📂 <span class="tab-label">Импорт CSV</span></button>
    </div>
</div>

<script>
(function() {
    // ========== 1. Хранилище и данные ==========
    const STORAGE_KEY = 'flextime_logger';
    const THEME_KEY = 'flextime_theme';
    let history = [];

    function loadFromLocalStorage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed)) history = parsed;
            } catch(e) {}
        }
        // Не сортируем здесь, сортировка происходит при отрисовке
    }

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function getCurrentDateTime() {
        const now = new Date();
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        const dateStr = `${day}.${month}.${year}`;
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const timeStr = `${hours}:${minutes}:${seconds}`;
        const fullISO = now.toISOString();
        const timestamp = now.getTime();
        return { date: dateStr, time: timeStr, fullISO: fullISO, timestamp: timestamp };
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Подсчёт часов за сегодня
    function calculateTodayHours() {
        const today = new Date().toLocaleDateString('ru-RU');
        const todayEvents = history.filter(record => record.date === today);
        if (todayEvents.length === 0) return `🕘 Сегодня: —`;

        let totalMinutes = 0;
        let lastArrive = null;
        const sorted = [...todayEvents].sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));

        for (const event of sorted) {
            if (event.type === 'arrive') {
                lastArrive = event;
            } else if (event.type === 'leave' && lastArrive) {
                const leaveTime = new Date(event.fullISO).getTime();
                const arriveTime = new Date(lastArrive.fullISO).getTime();
                const diffMinutes = (leaveTime - arriveTime) / 60000;
                if (diffMinutes > 0 && diffMinutes < 720) {
                    totalMinutes += diffMinutes;
                }
                lastArrive = null;
            }
        }

        if (totalMinutes > 0) {
            const hours = Math.floor(totalMinutes / 60);
            const minutes = Math.floor(totalMinutes % 60);
            return `🕘 Сегодня: ${hours}ч ${minutes}м`;
        }
        return `🕘 Сегодня: —`;
    }

    // ========== 2. Основные действия ==========
    function addRecord(type) {
        const note = document.getElementById('noteInput').value.trim();
        const { date, time, fullISO, timestamp } = getCurrentDateTime();
        const newRecord = {
            id: Date.now() + Math.random(),
            type: type,
            date: date,
            time: time,
            fullISO: fullISO,
            timestamp: timestamp,
            createdAt: Date.now(),
            note: note
        };
        history.push(newRecord); // добавляем в конец, порядок определит отрисовка
        saveToLocalStorage();
        renderHistoryList();
        document.getElementById('noteInput').value = '';
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
    }

    function deleteRecordById(id) {
        const index = history.findIndex(r => String(r.id) === String(id));
        if (index !== -1) {
            history.splice(index, 1);
            saveToLocalStorage();
            renderHistoryList();
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
        }
    }

    function clearAllRecords() {
        if (history.length && confirm('⚠️ Удалить ВСЮ историю? Отменить нельзя.')) {
            history = [];
            saveToLocalStorage();
            renderHistoryList();
        }
    }

    // ========== 3. Редактирование ==========
    function editRecord(id) {
        const record = history.find(r => String(r.id) === String(id));
        if (!record) return;

        const modal = document.createElement('div');
        modal.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 20002;
            display: flex;
            align-items: center;
            justify-content: center;
        `;
        const form = document.createElement('div');
        form.style.cssText = `
            background: var(--menu-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 320px;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        `;
        form.innerHTML = `
            <h3 style="margin-bottom:16px;">✏️ Редактировать запись</h3>
            <label style="font-size:14px;">Дата (ДД.ММ.ГГГГ)</label>
            <input type="text" id="editDate" value="${record.date}" style="width:100%; padding:12px; margin:8px 0 16px; border-radius:24px; border:none; background:var(--input-bg); color:var(--text-primary);">
            <label style="font-size:14px;">Время (ЧЧ:ММ:СС)</label>
            <input type="text" id="editTime" value="${record.time}" style="width:100%; padding:12px; margin:8px 0 16px; border-radius:24px; border:none; background:var(--input-bg); color:var(--text-primary);">
            <label style="font-size:14px;">Заметка</label>
            <textarea id="editNote" rows="2" style="width:100%; padding:12px; margin:8px 0 20px; border-radius:24px; border:none; background:var(--input-bg); color:var(--text-primary);">${record.note || ''}</textarea>
            <div style="display:flex; gap:12px;">
                <button id="saveEditBtn" style="flex:1; background:#11998e; border:none; padding:12px; border-radius:40px; color:white; font-weight:600;">Сохранить</button>
                <button id="cancelEditBtn" style="flex:1; background:rgba(0,0,0,0.2); border:none; padding:12px; border-radius:40px; color:var(--text-primary);">Отмена</button>
            </div>
        `;
        modal.appendChild(form);
        document.body.appendChild(modal);

        document.getElementById('cancelEditBtn').onclick = () => modal.remove();
        document.getElementById('saveEditBtn').onclick = () => {
            const newDate = document.getElementById('editDate').value.trim();
            const newTime = document.getElementById('editTime').value.trim();
            const newNote = document.getElementById('editNote').value.trim();
            if (!newDate || !newTime) {
                alert('Дата и время обязательны');
                return;
            }
            record.date = newDate;
            record.time = newTime;
            record.note = newNote;

            const dateParts = newDate.split('.');
            const timeParts = newTime.split(':');
            if (dateParts.length === 3 && timeParts.length >= 2) {
                const year = dateParts[2];
                const month = dateParts[1];
                const day = dateParts[0];
                const hours = timeParts[0];
                const minutes = timeParts[1];
                const seconds = timeParts[2] || '00';
                record.fullISO = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}.000Z`;
                record.timestamp = new Date(record.fullISO).getTime();
            }
            // Не меняем createdAt
            saveToLocalStorage();
            renderHistoryList();
            modal.remove();
            alert('✅ Запись обновлена');
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
        };
    }

    function showActionMenu(recordId) {
        const existingMenu = document.querySelector('.action-menu');
        if (existingMenu) existingMenu.remove();

        const menu = document.createElement('div');
        menu.className = 'action-menu';
        menu.innerHTML = `
            <button class="edit-btn">✏️ Редактировать</button>
            <button class="delete-btn">🗑 Удалить</button>
        `;
        document.body.appendChild(menu);

        menu.querySelector('.edit-btn').onclick = () => {
            menu.remove();
            editRecord(recordId);
        };
        menu.querySelector('.delete-btn').onclick = () => {
            menu.remove();
            if (confirm('🗑 Удалить запись?')) deleteRecordById(recordId);
        };

        const closeHandler = (e) => {
            if (!menu.contains(e.target)) {
                menu.remove();
                document.removeEventListener('click', closeHandler);
            }
        };
        setTimeout(() => document.addEventListener('click', closeHandler), 10);
    }

    // ========== 4. Отрисовка списка (сортировка по createdAt, новые сверху) ==========
    function renderHistoryList() {
        const container = document.getElementById('logContainer');
        const counterSpan = document.getElementById('counter');
        const todayStatsSpan = document.getElementById('todayStats');

        const sorted = [...history].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        const total = sorted.length;

        let counterText = `${total} `;
        if (total === 1) counterText += 'запись';
        else if (total >= 2 && total <= 4) counterText += 'записи';
        else counterText += 'записей';
        counterSpan.innerText = counterText;
        todayStatsSpan.innerText = calculateTodayHours();

        if (total === 0) {
            container.innerHTML = '<div class="empty-state"><span>📭</span>История пуста</div>';
            return;
        }

        let html = '';
        for (let i = 0; i < sorted.length; i++) {
            const record = sorted[i];
            const recordNumber = sorted.length - i;
            const recordClass = record.type;
            const recordTypeText = record.type === 'arrive' ? '🏢 ПРИХОД' : '🏠 УХОД';
            html += `
                <div class="log-item ${recordClass}" data-id="${record.id}">
                    <div class="log-header">
                        <span class="log-type ${recordClass}">${recordTypeText} #${recordNumber}</span>
                        <span class="log-time">⏰ ${record.time}</span>
                    </div>
                    <div class="log-date">📅 ${record.date}</div>
                    ${record.note ? `<div class="log-note">📝 ${escapeHtml(record.note)}</div>` : ''}
                </div>
            `;
        }
        container.innerHTML = html;

        document.querySelectorAll('.log-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = item.getAttribute('data-id');
                showActionMenu(id);
            });
            item.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const id = item.getAttribute('data-id');
                showActionMenu(id);
            });
        });
    }

    // ========== 5. Тема ==========
    function initTheme() {
        const savedTheme = localStorage.getItem(THEME_KEY);
        const themeToggle = document.getElementById('themeToggle');
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
            themeToggle.textContent = '☀️';
        } else {
            document.body.classList.remove('light-theme');
            themeToggle.textContent = '🌙';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
        });
    }

    // ========== 6. Экспорт CSV ==========
    function exportCSV() {
        if (!history.length) {
            alert('Нет записей');
            return;
        }
        let csv = "\uFEFF№,Тип,Дата,Время,Заметка\n";
        // Экспорт в порядке createdAt (новые сверху)
        const sorted = [...history].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        sorted.forEach((record, index) => {
            const typeText = record.type === 'arrive' ? 'Приход' : 'Уход';
            const row = `${index+1},"${typeText}",${record.date},${record.time},"${(record.note || '').replace(/"/g, '""')}"`;
            csv += row + "\n";
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `flextime_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(url);
    }

    // ========== 7. Импорт из CSV ==========
    function restoreFromCSV() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.csv';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const text = await file.text();
                const lines = text.split('\n');
                const newRecords = [];
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    const match = line.match(/(\d+),"(Приход|Уход)",([^,]+),([^,]+),"(.*)"/);
                    if (match) {
                        const type = match[2] === 'Приход' ? 'arrive' : 'leave';
                        const date = match[3];
                        const time = match[4];
                        const note = match[5] || '';
                        const dateParts = date.split('.');
                        const timeParts = time.split(':');
                        let fullISO = '';
                        let timestamp = Date.now();
                        if (dateParts.length === 3 && timeParts.length >= 2) {
                            const year = dateParts[2];
                            const month = dateParts[1];
                            const day = dateParts[0];
                            const hours = timeParts[0];
                            const minutes = timeParts[1];
                            const seconds = timeParts[2] || '00';
                            fullISO = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}.000Z`;
                            timestamp = new Date(fullISO).getTime();
                        }
                        newRecords.push({
                            id: Date.now() + Math.random() + i,
                            type: type,
                            date: date,
                            time: time,
                            note: note,
                            fullISO: fullISO,
                            timestamp: timestamp,
                            createdAt: Date.now()
                        });
                    }
                }
                if (newRecords.length) {
                    if (confirm(`Найдено ${newRecords.length} записей в CSV. Добавить их к текущим?`)) {
                        history.push(...newRecords);
                        saveToLocalStorage();
                        renderHistoryList();
                        alert(`✅ Добавлено ${newRecords.length} записей из CSV`);
                    }
                } else {
                    alert('Не удалось распознать CSV файл. Убедитесь, что он экспортирован из FlexTime.');
                }
            } catch(err) {
                alert('Ошибка при чтении файла: ' + err.message);
            }
        };
        input.click();
    }

    // ========== 8. HTML-отчёт ==========
    function exportHTMLReport() {
        if (history.length === 0) {
            alert('Нет записей для экспорта');
            return;
        }
        const daysMap = new Map();
        history.forEach(record => {
            const isoDate = record.fullISO ? record.fullISO.slice(0,10) : null;
            if (!isoDate) return;
            if (!daysMap.has(isoDate)) daysMap.set(isoDate, []);
            daysMap.get(isoDate).push(record);
        });
        const sortedIsoDates = Array.from(daysMap.keys()).sort();
        const dailyStats = [];
        for (const isoDate of sortedIsoDates) {
            const records = daysMap.get(isoDate);
            const displayDate = records[0].date;
            let lastArrive = null;
            let totalMinutes = 0;
            const sortedRecords = [...records].sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));
            for (const event of sortedRecords) {
                if (event.type === 'arrive') {
                    lastArrive = event;
                } else if (event.type === 'leave' && lastArrive) {
                    const diff = (new Date(event.fullISO) - new Date(lastArrive.fullISO)) / 60000;
                    if (diff > 0 && diff < 720) totalMinutes += diff;
                    lastArrive = null;
                }
            }
            const hoursNum = totalMinutes / 60;
            const hours = Math.floor(hoursNum);
            const minutes = Math.floor((hoursNum % 1) * 60);
            const diff = hoursNum - 8;
            const absDiff = Math.abs(diff);
            const diffHours = Math.floor(absDiff);
            const diffMins = Math.floor((absDiff % 1) * 60);
            dailyStats.push({
                date: displayDate,
                hours: hours,
                minutes: minutes,
                hoursNum: hoursNum,
                diff: diff,
                diffText: diff === 0 ? '0' : (diff > 0 ? `+${diffHours}ч ${diffMins}м` : `-${diffHours}ч ${diffMins}м`),
                diffClass: diff > 0 ? 'overtime' : (diff < 0 ? 'undertime' : 'normal')
            });
        }
        dailyStats.reverse();
        const totalHours = dailyStats.reduce((sum, d) => sum + d.hoursNum, 0);
        const avgHours = (totalHours / dailyStats.length).toFixed(1);
        const totalOvertime = dailyStats.reduce((sum, d) => sum + (d.diff > 0 ? d.diff : 0), 0);
        const htmlContent = `<!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>FlexTime — Отчёт</title>
                <style>
                    *{margin:0;padding:0;box-sizing:border-box}
                    body{
                        background: radial-gradient(circle at 20% 30%, #1a0a2e, #0d1b2a, #2a0d1a);
                        padding:20px;
                        font-family:-apple-system,BlinkMacSystemFont,Roboto,sans-serif;
                        min-height:100vh;
                    }
                    .container{
                        max-width:800px;
                        margin:0 auto;
                        background:rgba(25, 15, 45, 0.85);
                        backdrop-filter:blur(20px);
                        border-radius:32px;
                        padding:24px;
                        border:1px solid rgba(255, 140, 66, 0.4);
                        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
                    }
                    h1{
                        color:#ffaa66;
                        margin-bottom:8px;
                        font-size:28px;
                    }
                    .sub{
                        color:#d4b8a0;
                        margin-bottom:24px;
                        padding-bottom:16px;
                        border-bottom:1px solid rgba(255, 160, 80, 0.3);
                        font-size:14px;
                    }
                    .stats{
                        display:grid;
                        grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
                        gap:16px;
                        margin-bottom:28px;
                    }
                    .stat-card{
                        background:rgba(0,0,0,0.35);
                        border-radius:20px;
                        padding:16px;
                        text-align:center;
                        backdrop-filter:blur(4px);
                    }
                    .stat-value{
                        font-size:28px;
                        font-weight:700;
                        color:#ffcc88;
                    }
                    .stat-label{
                        font-size:12px;
                        color:#c0b0d0;
                        margin-top:8px;
                    }
                    table{
                        width:100%;
                        border-collapse:collapse;
                    }
                    th,td{
                        padding:12px;
                        text-align:left;
                        border-bottom:1px solid rgba(255, 160, 80, 0.25);
                    }
                    th{
                        color:#ffaa66;
                        font-weight:600;
                    }
                    td{
                        color:#e0e0e0;
                    }
                    .overtime{
                        color:#ffcc88;
                        font-weight:600;
                    }
                    .undertime{
                        color:#ff9eae;
                        font-weight:600;
                    }
                    .normal{
                        color:#b0c0d0;
                    }
                    .footer{
                        color:#a090b0;
                        font-size:12px;
                        margin-top:24px;
                        padding-top:16px;
                        border-top:1px solid rgba(255, 160, 80, 0.25);
                        text-align:center;
                    }
                    .badge{
                        display:inline-block;
                        background:rgba(0,0,0,0.3);
                        padding:2px 8px;
                        border-radius:20px;
                        font-size:11px;
                        margin-left:8px;
                    }
                </style>
            </head>
            <body>
            <div class="container">
                <h1>⏱️ FlexTime — Отчёт о рабочем времени</h1>
                <div class="sub">Период: ${dailyStats[dailyStats.length-1]?.date || '—'} — ${dailyStats[0]?.date || '—'}</div>
                <div class="stats">
                    <div class="stat-card"><div class="stat-value">${dailyStats.length}</div><div class="stat-label">Рабочих дней</div></div>
                    <div class="stat-card"><div class="stat-value">${Math.floor(totalHours)}ч ${Math.floor(totalHours % 1 * 60)}м</div><div class="stat-label">Всего отработано</div></div>
                    <div class="stat-card"><div class="stat-value">${avgHours} ч/день</div><div class="stat-label">Средний день</div></div>
                    <div class="stat-card"><div class="stat-value">+${Math.floor(totalOvertime)}ч ${Math.floor(totalOvertime % 1 * 60)}м</div><div class="stat-label">Переработка</div></div>
                </div>
                <table>
                    <thead>
                        <tr><th>Дата</th><th>Отработано</th><th>Отклонение от 8ч</th></tr>
                    </thead>
                    <tbody>
                        ${dailyStats.map(d => `
                        <tr>
                            <td>${d.date}${d.hours === 0 && d.minutes === 0 ? ' <span class="badge" style="color:#ff9eae">⚠️ нет пары</span>' : ''}</td>
                            <td>${d.hours}ч ${d.minutes}м</td>
                            <td class="${d.diffClass}">${d.diffText}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
                <div class="footer">
                    📅 Отчёт сгенерирован ${new Date().toLocaleString('ru-RU')}<br>
                    🟠 Оранжевый/жёлтый = переработка | 🔴 Розовый = недоработка | ⚪ Серый = ровно 8ч
                </div>
            </div>
            </body>
            </html>`;
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#0a2a1a;z-index:20000;display:flex;flex-direction:column;animation:fadeInModal 0.3s ease;';
        const headerDiv = document.createElement('div');
        headerDiv.style.cssText = 'padding:20px 16px;padding-top:max(20px, env(safe-area-inset-top));background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(255,255,255,0.1);';
        const closeBtn = document.createElement('button');
        closeBtn.innerHTML = '← Вернуться';
        closeBtn.style.cssText = 'background:rgba(255,255,255,0.15);border:none;padding:10px 20px;border-radius:30px;color:white;font-weight:600;font-size:16px;cursor:pointer;';
        closeBtn.onclick = () => modal.remove();
        const titleSpan = document.createElement('span');
        titleSpan.innerHTML = '📊 Отчёт FlexTime';
        titleSpan.style.cssText = 'color:white;font-weight:600;font-size:16px;';
        headerDiv.appendChild(closeBtn);
        headerDiv.appendChild(titleSpan);
        const contentDiv = document.createElement('div');
        contentDiv.style.cssText = 'flex:1;overflow:auto;padding:16px;';
        contentDiv.innerHTML = htmlContent;
        modal.appendChild(headerDiv);
        modal.appendChild(contentDiv);
        document.body.appendChild(modal);
        if (!document.getElementById('modal-fade-style')) {
            const style = document.createElement('style');
            style.id = 'modal-fade-style';
            style.textContent = '@keyframes fadeInModal{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}';
            document.head.appendChild(style);
        }
    }

    // ========== 9. Инициализация ==========
    function init() {
        loadFromLocalStorage();
        renderHistoryList();
        initTheme();

        document.getElementById('arriveBtn').onclick = () => addRecord('arrive');
        document.getElementById('leaveBtn').onclick = () => addRecord('leave');
        document.getElementById('clearBtn').onclick = clearAllRecords;
        document.getElementById('exportReportBtn').onclick = exportHTMLReport;
        document.getElementById('exportBtn').onclick = exportCSV;
        document.getElementById('restoreCsvBtn').onclick = restoreFromCSV;
    }

    window.addEventListener('load', init);
})();

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
