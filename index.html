<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

        <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:radial-gradient(circle at 20% 30%, #0a2a1a, #051a0f);min-height:100vh;padding:max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));font-family:-apple-system,BlinkMacSystemFont,Roboto,Helvetica,sans-serif;touch-action:manipulation}
        .app-container{max-width:600px;margin:0 auto;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:48px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.1)}
        .header{background:rgba(20,40,30,0.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;padding:max(20px, env(safe-area-inset-top)) 20px 28px 20px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.1)}
        .header h1{font-size:32px;font-weight:700;margin-bottom:8px;text-shadow:0 2px 10px rgba(0,0,0,0.2)}
        .header p{font-size:14px;opacity:.7;letter-spacing:0.5px}
        .action-buttons{padding:24px 20px 16px;display:flex;gap:14px}
        .action-btn{flex:1;padding:18px 12px;border:none;border-radius:80px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all 0.2s cubic-bezier(0.2,0.9,0.4,1.1);touch-action:manipulation;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);position:relative;overflow:hidden}
        .action-btn:active{transform:scale(0.96);filter:brightness(0.95)}
        .action-btn::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),rgba(255,255,255,0));border-radius:80px}
        .btn-arrive{background:linear-gradient(135deg,rgba(17,153,142,0.8),rgba(56,239,125,0.7));color:#fff;box-shadow:0 8px 20px rgba(17,153,142,0.3);border:1px solid rgba(255,255,255,0.2)}
        .btn-leave{background:linear-gradient(135deg,rgba(238,9,121,0.8),rgba(255,106,0,0.7));color:#fff;box-shadow:0 8px 20px rgba(238,9,121,0.3);border:1px solid rgba(255,255,255,0.2)}
        .note-section{padding:8px 20px 20px}
        .note-input{width:100%;padding:14px 18px;border:none;border-radius:32px;font-size:15px;font-family:inherit;background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;resize:none;transition:all 0.2s;border:1px solid rgba(255,255,255,0.1)}
        .note-input:focus{outline:none;background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.3)}
        .note-input::placeholder{color:rgba(255,255,255,0.5)}
        .stats-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.08)}
        .count-badge{background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#fff;padding:6px 16px;border-radius:40px;font-weight:600;font-size:14px;border:1px solid rgba(255,255,255,0.1)}
        .today-stats{font-size:13px;color:rgba(255,255,255,0.7);font-weight:500}
        .clear-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:6px 16px;border-radius:40px;font-size:13px;font-weight:500;color:#ff8a8a;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(8px)}
        .clear-btn:active{background:rgba(255,68,68,0.2);transform:scale(0.96);border-color:rgba(255,100,100,0.4)}
        .history-section{padding:20px;background:transparent}
        .history-title{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:18px;font-weight:600;color:rgba(255,255,255,0.9);text-shadow:0 1px 4px rgba(0,0,0,0.2)}
        .log-container{max-height:400px;overflow-y:auto;border-radius:24px;display:flex;flex-direction:column;gap:10px}
        .log-container::-webkit-scrollbar{width:4px}
        .log-container::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:10px}
        .log-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.3);border-radius:10px}
        .log-item{background:rgba(255,255,255,0.08);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.1);border:1px solid rgba(255,255,255,0.12);transition:all 0.2s;animation:slideIn 0.25s ease}
        .log-item:active{transform:scale(0.98);background:rgba(255,255,255,0.12)}
        .log-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:8px}
        .log-type{font-weight:700;font-size:13px;padding:4px 14px;border-radius:30px;background:rgba(255,255,255,0.1);backdrop-filter:blur(4px);letter-spacing:0.3px}
        .log-type.arrive{color:#6ef0b0;border-left:2px solid #38ef7d}
        .log-type.leave{color:#ff9e7a;border-left:2px solid #ff6a00}
        .log-time{font-size:18px;font-weight:700;font-family:monospace;color:rgba(255,255,255,0.95);letter-spacing:0.5px}
        .log-date{font-size:12px;color:rgba(255,255,255,0.55);margin-top:2px}
        .log-note{margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);font-size:13px;color:rgba(255,255,255,0.6);font-style:italic}
        .empty-state{text-align:center;padding:50px 20px;color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.04);border-radius:28px;backdrop-filter:blur(8px);font-size:14px}
        .empty-state span{font-size:48px;display:block;margin-bottom:12px;opacity:0.7}
        .export-section{padding:16px 20px max(28px, env(safe-area-inset-bottom));background:transparent;border-top:1px solid rgba(255,255,255,0.08)}
        .export-btn{width:100%;background:rgba(255,255,255,0.08);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.2);padding:14px;border-radius:80px;font-size:16px;font-weight:600;color:rgba(255,255,255,0.9);cursor:pointer;transition:all 0.2s}
        .export-btn:active{background:rgba(255,255,255,0.18);transform:scale(0.97);border-color:rgba(255,255,255,0.35)}
        @keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        </style>
</head>
<body>
<div class="app-container">
    <div class="header"><h1>⏱️ FlexTime</h1><p>Учёт гибкого рабочего времени | Приход → Уход</p></div>
    <div class="action-buttons"><button class="action-btn btn-arrive" id="arriveBtn">🏢 ПРИХОД</button><button class="action-btn btn-leave" id="leaveBtn">🏠 УХОД</button></div>
    <div class="note-section"><textarea class="note-input" id="noteInput" rows="2" placeholder="📝 Заметка (необязательно)"></textarea></div>
    <div class="stats-bar"><div><span class="count-badge" id="counter">0 записей</span></div><div class="today-stats" id="todayStats">Сегодня: —</div><button class="clear-btn" id="clearBtn">🗑 Очистить</button></div>
    <div class="history-section"><div class="history-title">📜 История событий</div><div class="log-container" id="logContainer"><div class="empty-state"><span>👆</span>Нажми «ПРИХОД» когда придёшь на работу<br>Нажми «УХОД» когда уходишь</div></div></div>
    <div style="display: flex; gap: 10px;">
    <button class="export-btn" id="exportBtn" style="flex:1;">📄 CSV (данные)</button>
    <button class="export-btn" id="exportReportBtn" style="flex:1;">📊 HTML (отчёт с цветами)</button>
</div>
    <div style="display: flex; gap: 10px; margin-top: 10px;">
    <button class="export-btn" id="uploadBtn" style="flex:1; background:rgba(66,133,244,0.2); border-color:#4285f4;">☁️ Выгрузить в Google</button>
    <button class="export-btn" id="downloadBtn" style="flex:1; background:rgba(52,168,83,0.2); border-color:#34a853;">☁️ Загрузить из Google</button>
</div>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 10px;">
<button class="export-btn" id="importBtn" style="flex:1; background:rgba(255,193,7,0.2); border-color:#ffc107;">📁 Импорт из CSV</button>
</div>
</div>
<script>
(function(){
const STORAGE_KEY='flextime_logger';
let h=[];
// URL твоего веб-приложения из Apps Script
const API_URL = 'https://script.google.com/macros/s/AKfycbxRvLjp4DKDGJRV0X8XovlAYOd5OsYUaW8NbGdvxlA3SBA8HNyC0DyJsz_bHayQxMihkw/exec';

// CORS-прокси (бесплатный, не хранит данные)
const CORS_PROXY = 'https://cors-anywhere.herokuapp.com/';

// Выгрузить данные в Google Sheets
async function uploadToSheets() {
    if (h.length === 0) {
        alert('Нет данных для выгрузки');
        return;
    }
    try {
        const btn = document.getElementById('uploadBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '⏳ Отправка...';
        
        // Используем прокси для обхода CORS
        const response = await fetch(CORS_PROXY + API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Origin': window.location.origin
            },
            body: JSON.stringify(h)
        });
        
        btn.innerHTML = originalText;
        
        if (response.ok) {
            const result = await response.json();
            if (result.status === 'ok') {
                alert('✅ Данные сохранены в Google Sheets');
            } else {
                alert('❌ Ошибка: ' + (result.error || 'неизвестная'));
            }
        } else {
            alert('❌ Ошибка сервера: ' + response.status);
        }
    } catch(e) {
        console.error('Ошибка:', e);
        alert('⚠️ Ошибка соединения. Проверь интернет.\n\n' + e.message);
    }
}

// Загрузить данные из Google Sheets
async function downloadFromSheets() {
    try {
        const btn = document.getElementById('downloadBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '⏳ Загрузка...';
        
        // Используем прокси для обхода CORS
        const response = await fetch(CORS_PROXY + API_URL + '?t=' + Date.now());
        
        btn.innerHTML = originalText;
        
        if (!response.ok) {
            throw new Error('HTTP ' + response.status);
        }
        
        const data = await response.json();
        
        if (data.error) {
            alert('Ошибка: ' + data.error);
            return;
        }
        
        if (data && data.length) {
            h = data;
            save();
            render();
            alert('✅ Данные загружены из Google Sheets');
        } else {
            alert('Нет данных в таблице');
        }
    } catch(e) {
        console.error('Ошибка:', e);
        alert('⚠️ Ошибка загрузки. Проверь интернет.\n\n' + e.message);
    }
}

function load(){const s=localStorage.getItem(STORAGE_KEY);if(s)try{const p=JSON.parse(s);if(Array.isArray(p))h=p;}catch(e){}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(h));}
function now(){const d=new Date(),date=`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`,time=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;return{date,time,fullISO:d.toISOString(),ts:d.getTime()};}
function add(t){const note=document.getElementById('noteInput').value.trim(),{date,time,fullISO,ts}=now();h.unshift({id:Date.now()+Math.random(),type:t,date,time,fullISO,ts,note:note||''});save();render();document.getElementById('noteInput').value='';if(window.navigator?.vibrate)window.navigator.vibrate(50);}
function todayHours(){const today=new Date().toLocaleDateString('ru-RU'),events=h.filter(r=>r.date===today);let last=null,min=0;for(let i=events.length-1;i>=0;i--){const e=events[i];if(e.type==='arrive')last=e;else if(e.type==='leave'&&last){const diff=(new Date(e.fullISO)-new Date(last.fullISO))/60000;if(diff>0&&diff<720)min+=diff;last=null;}}if(min>0)return`🕘 ${Math.floor(min/60)}ч ${Math.floor(min%60)}м`;return'🕘 —';}
function clearAll(){if(h.length&&confirm('Удалить всё?')){h=[];save();render();}}
function delById(id){const idx=h.findIndex(r=>String(r.id)===String(id));if(idx!==-1){h.splice(idx,1);save();render();if(window.navigator?.vibrate)window.navigator.vibrate(50);}}
    
function exportCSV(){if(!h.length){alert('Нет записей');return;}let csv="\uFEFF№,Тип,Дата,Время,Заметка\n";h.forEach((r,i)=>{const t=r.type==='arrive'?'Приход':'Уход';csv+=`${h.length-i},"${t}",${r.date},${r.time},"${r.note.replace(/"/g,'""')}"\n`;});const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const link=document.createElement('a');const url=URL.createObjectURL(blob);link.href=url;link.download=`flextime_${new Date().toISOString().slice(0,10)}.csv`;link.click();URL.revokeObjectURL(url);}
function exportToHTML() {if (h.length === 0) {alert('Нет записей для экспорта');return;}const daysMap = new Map();h.forEach(record => {if (!daysMap.has(record.date)) {daysMap.set(record.date, []);}daysMap.get(record.date).push(record);});const sortedDays = Array.from(daysMap.keys()).sort();const dailyHours = [];sortedDays.forEach(date => {const events = daysMap.get(date);let lastArrive = null;let totalMinutes = 0;for (let i = events.length - 1; i >= 0; i--) {const event = events[i];if (event.type === 'arrive') {lastArrive = event;} else if (event.type === 'leave' && lastArrive) {const arriveTime = new Date(lastArrive.fullISO);const leaveTime = new Date(event.fullISO);const diffMinutes = (leaveTime - arriveTime) / 1000 / 60;if (diffMinutes > 0 && diffMinutes < 720) {totalMinutes += diffMinutes;}lastArrive = null;}}const hoursNum = totalMinutes / 60;const hours = Math.floor(hoursNum);const minutes = Math.floor(hoursNum % 1 * 60);const diff = hoursNum - 8;const diffHours = Math.floor(Math.abs(diff));const diffMins = Math.floor(Math.abs(diff) % 1 * 60);dailyHours.push({date, hours, minutes, hoursNum, diff,diffText: diff === 0 ? '0' : (diff > 0 ? `+${diffHours}ч ${diffMins}м` : `-${diffHours}ч ${diffMins}м`),diffClass: diff > 0 ? 'overtime' : (diff < 0 ? 'undertime' : 'normal')});});const totalHours = dailyHours.reduce((sum, d) => sum + d.hoursNum, 0);const avgHours = (totalHours / dailyHours.length).toFixed(1);const totalOvertime = dailyHours.reduce((sum, d) => sum + (d.diff > 0 ? d.diff : 0), 0);const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FlexTime — Отчёт</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a2a1a;padding:20px;font-family:-apple-system,BlinkMacSystemFont,Roboto,sans-serif}.container{max-width:800px;margin:0 auto;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border-radius:32px;padding:24px;border:1px solid rgba(255,255,255,0.1)}h1{color:white;margin-bottom:8px}.sub{color:rgba(255,255,255,0.6);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1)}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}.stat-card{background:rgba(255,255,255,0.05);border-radius:20px;padding:16px;text-align:center}.stat-value{font-size:28px;font-weight:700;color:white}.stat-label{font-size:13px;color:rgba(255,255,255,0.5);margin-top:8px}table{width:100%;border-collapse:collapse}th,td{padding:12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.08)}th{color:rgba(255,255,255,0.7);font-weight:600}.overtime{color:#4ade80;font-weight:600}.undertime{color:#f87171;font-weight:600}.normal{color:rgba(255,255,255,0.7)}.footer{color:rgba(255,255,255,0.4);font-size:12px;margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08);text-align:center}</style></head><body><div class="container"><h1>⏱️ FlexTime — Отчёт о рабочем времени</h1><div class="sub">Период: ${sortedDays[0] || '—'} — ${sortedDays[sortedDays.length-1] || '—'}</div><div class="stats"><div class="stat-card"><div class="stat-value">${dailyHours.length}</div><div class="stat-label">Рабочих дней</div></div><div class="stat-card"><div class="stat-value">${Math.floor(totalHours)}ч ${Math.floor(totalHours%1*60)}м</div><div class="stat-label">Всего отработано</div></div><div class="stat-card"><div class="stat-value">${avgHours} ч/день</div><div class="stat-label">Средний день</div></div><div class="stat-card"><div class="stat-value">+${Math.floor(totalOvertime)}ч ${Math.floor(totalOvertime%1*60)}м</div><div class="stat-label">Переработка</div></div></div><tr><thead><tr><th>Дата</th><th>Отработано</th><th>Отклонение от 8ч</th></tr></thead><tbody>${dailyHours.map(d => `<tr><td>${d.date}${d.hours === 0 && d.minutes === 0 ? ' <span style="color:#f87171">⚠️</span>' : ''}</td><td>${d.hours}ч ${d.minutes}м${d.hours === 0 && d.minutes === 0 ? ' <span style="color:#f87171">(нет ухода?)</span>' : ''}${d.hours === 0 && d.minutes === 0 ? '' : ''}</td><td class="${d.diffClass}">${d.diffText}${d.hours === 0 && d.minutes === 0 ? ' (нет полной пары)' : ''}</td>`).join('')}</tbody></table><div class="footer">📅 Отчёт сгенерирован ${new Date().toLocaleString('ru-RU')}<br>✅ Зелёный = переработка | ❌ Красный = недоработка</div></div></body></html>`;const modal = document.createElement('div');
    modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a2a1a;
        z-index: 20000;
        display: flex;
        flex-direction: column;
        animation: fadeInModal 0.3s ease;
    `;
    
    const header = document.createElement('div');
    header.style.cssText = `
        padding: 20px 16px;
        padding-top: max(20px, env(safe-area-inset-top));
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        display: flex;
        align-items: center;
        gap: 16px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    `;
    
    const closeBtn = document.createElement('button');
    closeBtn.innerHTML = '← Вернуться';
    closeBtn.style.cssText = `
        background: rgba(255,255,255,0.15);
        border: none;
        padding: 10px 20px;
        border-radius: 30px;
        color: white;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.1s ease;
    `;
    closeBtn.onclick = () => modal.remove();
    
    const title = document.createElement('span');
    title.innerHTML = '📊 Отчёт FlexTime';
    title.style.cssText = `
        color: white;
        font-weight: 600;
        font-size: 16px;
    `;
    
    header.appendChild(closeBtn);
    header.appendChild(title);
    
    const content = document.createElement('div');
    content.style.cssText = `
        flex: 1;
        overflow: auto;
        padding: 16px;
    `;
    content.innerHTML = html;
    
    modal.appendChild(header);
    modal.appendChild(content);
    document.body.appendChild(modal);
    
    // Добавляем анимацию, если ещё нет
    if (!document.getElementById('modal-fade-style')) {
        const style = document.createElement('style');
        style.id = 'modal-fade-style';
        style.textContent = `
            @keyframes fadeInModal {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    }
}
// Импорт из CSV файла
function importFromCSV() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.csv';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const text = await file.text();
        const lines = text.split('\n');
        const headers = lines[0].split(',');
        
        const newRecords = [];
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            // Парсим CSV (упрощённо)
            const match = line.match(/(\d+),"([^"]+)",([^,]+),([^,]+),"([^"]*)"/);
            if (match) {
                newRecords.push({
                    id: Date.now() + Math.random() * i,
                    type: match[2] === 'Приход' ? 'arrive' : 'leave',
                    date: match[3],
                    time: match[4],
                    fullISO: new Date().toISOString(),
                    timestamp: Date.now(),
                    note: match[5] || ''
                });
            }
        }
        
        if (newRecords.length) {
            h = [...newRecords, ...h];
            save();
            render();
            alert(`✅ Импортировано ${newRecords.length} записей`);
        } else {
            alert('Не удалось распознать файл');
        }
    };
    input.click();
}
    
function render(){const cont=document.getElementById('logContainer'),cSpan=document.getElementById('counter'),tSpan=document.getElementById('todayStats');const total=h.length;cSpan.innerText=`${total} ${total===1?'запись':(total>=2&&total<=4?'записи':'записей')}`;tSpan.innerText=todayHours();if(!total){cont.innerHTML='<div class="empty-state"><span>📭</span>История пуста</div>';return;}let html='';h.forEach((r,i)=>{const num=h.length-i,cls=r.type,txt=r.type==='arrive'?'🏢 ПРИХОД':'🏠 УХОД';html+=`<div class="log-item ${cls}" data-id="${r.id}"><div class="log-header"><span class="log-type ${cls}">${txt} #${num}</span><span class="log-time">⏰ ${r.time}</span></div><div class="log-date">📅 ${r.date}</div>${r.note?`<div class="log-note">📝 ${escapeHtml(r.note)}</div>`:''}</div>`;});cont.innerHTML=html;document.querySelectorAll('.log-item').forEach(item=>{let timer;item.addEventListener('touchstart',()=>{timer=setTimeout(()=>{if(confirm('🗑 Удалить запись?'))delById(item.dataset.id);},500);});item.addEventListener('touchend',()=>clearTimeout(timer));item.addEventListener('touchmove',()=>clearTimeout(timer));item.addEventListener('contextmenu',(e)=>{e.preventDefault();if(confirm('🗑 Удалить запись?'))delById(item.dataset.id);});});}
function escapeHtml(t){const div=document.createElement('div');div.textContent=t;return div.innerHTML;}
load();render();document.getElementById('arriveBtn').onclick=()=>add('arrive');document.getElementById('leaveBtn').onclick=()=>add('leave');document.getElementById('clearBtn').onclick=clearAll;document.getElementById('exportBtn').onclick=exportCSV;document.getElementById('exportReportBtn').onclick=exportToHTML;document.getElementById('uploadBtn').onclick = uploadToSheets;document.getElementById('downloadBtn').onclick = downloadFromSheets;document.getElementById('importBtn').onclick = importFromCSV;
})();
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
    <script>
        if ('serviceWorker' in navigator) {navigator.serviceWorker.register('/sw.js').then(reg => {reg.addEventListener('updatefound', () => {const newWorker = reg.installing;newWorker.addEventListener('statechange', () => {if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {const updateNotification = document.createElement('div');updateNotification.innerHTML = `<div style="position:fixed;bottom:20px;left:20px;right:20px;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);border-radius:20px;padding:16px;text-align:center;z-index:1000;border:1px solid rgba(255,255,255,0.2);color:white;">⚡ Доступна новая версия!<br><button id="reloadBtn" style="margin-top:10px;background:#11998e;border:none;padding:8px 20px;border-radius:30px;color:white;font-weight:bold;">Обновить сейчас</button></div>`;document.body.appendChild(updateNotification);document.getElementById('reloadBtn').onclick = () => {newWorker.postMessage({action: 'skipWaiting'});window.location.reload();};}});});});setInterval(() => {navigator.serviceWorker.ready.then(reg => {reg.update();});}, 60 * 60 * 1000);}
    </script>
